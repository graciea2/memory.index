<!DOCTYPE html>
<html>
    
    <head>
    <title>Icon Template Square</title>
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.0/buzz.min.js"></script>
        
        <style>
            .row{
                width:720px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;
            }
        </style>
    </head>

    <body style="background-color: rgb(196, 196, 193);">
        <div class="row">
            <div class="image-container"><img id="img1" src="img/cam.PNG" height="200" width="200" onmousedown="this.src='img/cam2.png';" onmouseup="this.src='img/cam.png';"/></div>
            <div class="image-container"><img id="img2" src="img/candle.PNG" height="200" width="200"onmousedown="this.src='img/candle2.png';" onmouseup="this.src='img/candle.png';"/></div>
            <div class="image-container"><img id="img3" src="img/cassette.PNG" height="200" width="200" onmousedown="this.src='img/cassette2.png';" onmouseup="this.src='img/cassette.png';"/></div>
        </div>

        <div class="row">
            <div class="image-container"><img id="img4" src="img/clock.PNG" height="200" width="200" onmousedown="this.src='img/clock2.png';" onmouseup="this.src='img/clock.png';"/></div>
            <div class="image-container"><img id="img5" src="img/flower.PNG" height="200" width="200" onmousedown="this.src='img/flower2.png';" onmouseup="this.src='img/flower.png';"/></div>
            <div class="image-container"><img id="img6" src="img/key.PNG" height="200" width="200" onmousedown="this.src='img/key2.png';" onmouseup="this.src='img/key.png';"/></div>
            </div>

        <div class="row">
            <div class="image-container"><img id="img7" src="img/letter.PNG" height="200" width="200" onmousedown="this.src='img/letter2.png';" onmouseup="this.src='img/letter.png';"/></div>
            <div class="image-container"><img id="img8" src="img/phone.PNG" height="200" width="200" onmousedown="this.src='img/phone2.png';" onmouseup="this.src='img/phone.png';"/></div>
            <div class="image-container"><img id="img9" src="img/window.PNG" height="200" width="200" onmousedown="this.src='img/window2.png';" onmouseup="this.src='img/window.png';"/></div>
        </div>
        
        <script>
            var sound1 = new buzz.sound("sound/cameraclicking.mp3");
            var sound2 = new buzz.sound("sound/firecackling.mp3");
            var sound3 = new buzz.sound("sound/tapeinsert.mp3");
            var sound4 = new buzz.sound("sound/clocksticking.mp3");
            var sound5 = new buzz.sound("sound/beautifulnature.mp3");
            var sound6 = new buzz.sound("sound/keysjingling.mp3");
            var sound7 = new buzz.sound("sound/paperunfolding.mp3");
            var sound8 = new buzz.sound("sound/phonering.mp3");
            var sound9 = new buzz.sound("sound/birdswhistling.mp3");
     
            window.onload = function() {
                document.getElementById('img1').addEventListener('click', function () {sound1.play(); });  
                document.getElementById('img2').addEventListener('click', function () {sound2.play(); });
                document.getElementById('img3').addEventListener('click', function () {sound3.play(); });
                document.getElementById('img4').addEventListener('click', function () {sound4.play(); });
                document.getElementById('img5').addEventListener('click', function () {sound5.play(); }); 
                document.getElementById('img6').addEventListener('click', function () {sound6.play(); }); 
                document.getElementById('img7').addEventListener('click', function () {sound7.play(); }); 
                document.getElementById('img8').addEventListener('click', function () {sound8.play(); }); 
                document.getElementById('img9').addEventListener('click', function () {sound9.play(); });
            }  
        </script>   
        
    </body>
    
</html>
